<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="{{ 'assets/css/style.css?v=' | append: site.github.build_revision }}">
  </head>
  <body>
    <header class="page-header" role="banner">
      <h1 class="project-name">SCCP 2025</h1>
      <h2>1st Symposium on Checking Consistency Principles</h2>
      <h2 class="project-tagline">2025 &mdash; Co-located with <a href="#">[Conference TBD]</a></h2>
      <a href="index.html" class="btn">Home</a>
      <a href="cfp.html" class="btn">Call for Papers</a>
      <a href="program.html" class="btn">Program</a>
      <a href="committees.html" class="btn">Committees</a>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        {% if site.github.is_project_page %}
          <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">SCCP 2025</a> is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.</span>
        {% endif %}
      </footer>
    </main>
  </body>
</html>
